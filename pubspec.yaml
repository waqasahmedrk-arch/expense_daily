name: expense_tracker
description: A PKR Expense Tracker App with dark/light theme
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Charts
  fl_chart: ^0.68.0

  # Internationalization & Date Formatting
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.8

  # Image Picker
  image_picker: ^1.1.2

  # Firebase
  firebase_core: ^3.15.2
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.6.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^4.0.0

  # Launcher Icons Generator
  flutter_launcher_icons: ^0.14.4

# ─── Launcher Icon Configuration ─────────────────────────────────────────────
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  min_sdk_android: 21                            # Android 5.0+ correct sizing

  # iOS + Android legacy — full image, no padding needed
  image_path: "assets/images/app_icon.png"

  # Android Adaptive Icon (API 26+)
  # Both layers use the same image → icon fills the box completely, no color bg
  adaptive_icon_background: "assets/images/app_icon.png"
  adaptive_icon_foreground: "assets/images/app_icon.png"

  # iOS: strip alpha to avoid App Store rejection
  remove_alpha_ios: true

  # Web (optional)
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"

  # Windows (optional)
  windows:
    generate: true
    image_path: "assets/images/app_icon.png"
    icon_size: 48

# ─── Flutter Configuration ────────────────────────────────────────────────────
flutter:
  uses-material-design: true

  assets:
    - assets/images/app_icon.png